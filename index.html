<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sitio simple con Bootstrap 5</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <main class="container text-center min-vh-100 d-flex flex-column justify-content-center">
    <!-- Texto grande -->
    <h1 class="display-4 fw-bold mb-4">Texto grande de ejemplo</h1>
    <p class="lead mb-4">Este es un sitio simple utilizando Bootstrap 5. Un botón para "me gusta" también está incluido.</p>

    <!-- Botón "me gusta" -->
    <button id="likeBtn" class="btn btn-primary btn-lg" type="button">me gusta</button>

    <!-- Contador de me gusta (opcional) -->
    <p id="likeCount" class="mt-3 text-muted">0 Me gusta</p>
  </main>

  <!-- Bootstrap 5 JS (opcional si solo usas CSS) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    // Funcionalidad simple: incrementa un contador al hacer clic en el botón
    document.addEventListener('DOMContentLoaded', function () {
      const btn = document.getElementById('likeBtn');
      const countEl = document.getElementById('likeCount');
      let count = 0;

      btn.addEventListener('click', function () {
        count += 1;
        countEl.textContent = count + ' Me gusta';
      });
    });
  </script>
</body>
</html>
